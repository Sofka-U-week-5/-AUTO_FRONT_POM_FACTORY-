# =============================================================================
# Configuración de Serenity BDD
# =============================================================================

serenity {
  # Nombre del proyecto que aparece en los reportes
  project.name = "PUP POM Test Automation"

  # Tomar screenshots: BEFORE_AND_AFTER_EACH_STEP, AFTER_EACH_STEP, FOR_FAILURES, DISABLED
  take.screenshots = FOR_FAILURES

  # Formato de los reportes
  report.encoding = "UTF-8"

  # Logging level
  logging = VERBOSE
}

# =============================================================================
# Configuración de WebDriver
# =============================================================================

webdriver {
  # Driver por defecto: chrome, firefox, edge, safari
  driver = chrome

  # Tiempo máximo de espera implícita (en milisegundos)
  wait.for.timeout = 10000

  # Tiempo de espera para elementos (en segundos)
  timeouts {
    implicitlywait = 5000
    fluentwait = 10000
  }
}

# =============================================================================
# Configuración de Chrome
# =============================================================================

chrome {
  switches = """--start-maximized;--disable-popup-blocking;--disable-infobars;--disable-notifications"""
}

# Modo headless (sin interfaz gráfica)
headless.mode = false

# =============================================================================
# Ambientes de prueba
# =============================================================================

environments {
  default {
    webdriver.base.url = "https://example.com"
  }

  dev {
    webdriver.base.url = "https://dev.example.com"
  }

  qa {
    webdriver.base.url = "https://qa.example.com"
  }

  staging {
    webdriver.base.url = "https://staging.example.com"
  }

  prod {
    webdriver.base.url = "https://example.com"
  }
}
